spring:
  application:
    name: fintracking-batch
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

server:
  port: 0

eureka:
  client:
    enabled: false
